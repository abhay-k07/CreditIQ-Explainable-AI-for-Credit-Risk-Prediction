name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          # Remove screenshots and other binary files not needed for the Space
          rm -rf screenshots/
          rm -f image.png
          # Create an orphan branch to start a fresh history without binary traces
          git checkout --orphan hf-sync
          git add .
          git commit -m "Fresh sync to Hugging Face Space"
          # Push the clean orphan branch to the HF main branch
          git push --force https://abhay-k07:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/abhay-k07/CreditIQ hf-sync:main
